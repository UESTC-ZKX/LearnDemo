  <text x="660" y="664" fill="#EAF1FF" font-size="22" font-family="Arial">Tool call</text>
  <text x="828" y="664" fill="#EAF1FF" font-size="22" font-family="Arial">Continue reasoning</text>
  <text x="1030" y="664" fill="#EAF1FF" font-size="22" font-family="Arial">Answer</text>
