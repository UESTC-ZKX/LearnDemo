  <text x="70" y="98" fill="#E6F0FF" font-size="42" font-family="Arial" font-weight="700">Conversation Engine / QueryEngine</text>
  <text x="70" y="135" fill="#8FB4E8" font-size="22" font-family="Arial">Agent turn runtime loop</text>
  <rect x="72" y="180" width="220" height="250" rx="20" fill="#122846" stroke="#4F8CE8"/>
  <text x="98" y="220" fill="#F8FBFF" font-size="24" font-family="Arial" font-weight="700">Inputs</text>
  <text x="98" y="265" fill="#C8D8F2" font-size="20" font-family="Arial">User request</text>
  <text x="98" y="305" fill="#C8D8F2" font-size="20" font-family="Arial">History</text>
  <text x="98" y="345" fill="#C8D8F2" font-size="20" font-family="Arial">Memory</text>
  <text x="98" y="385" fill="#C8D8F2" font-size="20" font-family="Arial">Attachments</text>
  <rect x="330" y="160" width="530" height="430" rx="24" fill="#112138" stroke="#5E9CFF" stroke-width="2"/>
  <text x="365" y="206" fill="#F8FBFF" font-size="28" font-family="Arial" font-weight="700">QueryEngine Main Loop</text>
  <g fill="#E8F2FF" font-size="20" font-family="Arial">
    <rect x="366" y="236" width="460" height="42" rx="12" fill="#1A3356"/><text x="392" y="264">1. Request model with assembled context</text>
    <rect x="366" y="288" width="460" height="42" rx="12" fill="#1A3356"/><text x="392" y="316">2. Receive streaming output</text>
    <rect x="366" y="340" width="460" height="42" rx="12" fill="#1A3356"/><text x="392" y="368">3. Detect tool_use blocks</text>
    <rect x="366" y="392" width="460" height="42" rx="12" fill="#1A3356"/><text x="392" y="420">4. Write tool_result back to context</text>
    <rect x="366" y="444" width="460" height="42" rx="12" fill="#1A3356"/><text x="392" y="472">5. Continue generation or stop</text>
    <rect x="366" y="496" width="460" height="42" rx="12" fill="#1A3356"/><text x="392" y="524">6. Recover errors and retry</text>
    <rect x="366" y="548" width="460" height="42" rx="12" fill="#1A3356"/><text x="392" y="576">7. Compact context and free budget</text>
  </g>
  <rect x="890" y="180" width="230" height="250" rx="20" fill="#102C2E" stroke="#43D5C7"/>
  <text x="920" y="220" fill="#F4FFFF" font-size="24" font-family="Arial" font-weight="700">Runtime Guards</text>
  <text x="920" y="268" fill="#D4F8F5" font-size="20" font-family="Arial">Thinking / Streaming</text>
  <text x="920" y="308" fill="#D4F8F5" font-size="20" font-family="Arial">Retry / Fallback</text>
  <text x="920" y="348" fill="#D4F8F5" font-size="20" font-family="Arial">Token Budget</text>
  <text x="920" y="388" fill="#D4F8F5" font-size="20" font-family="Arial">Abort / Interrupt</text>
  <path d="M120 620H1030" stroke="#6EA1FF" stroke-width="3" stroke-dasharray="10 10"/>
  <text x="92" y="664" fill="#EAF1FF" font-size="22" font-family="Arial">User input</text>
  <text x="256" y="664" fill="#EAF1FF" font-size="22" font-family="Arial">Context assembly</text>
